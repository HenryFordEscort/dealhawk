name: DealHawk Summary

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: dealhawk-summary
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj zależności
        run: pip install cloudscraper requests

      - name: Wyślij podsumowanie dnia
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python summary.py

      - name: Zapisz pinned_summary.json
        run: |
          git config user.name "DealHawk Bot"
          git config user.email "bot@dealhawk"
          for p in pinned_summary.json olx_watch.json olx_details.json history.jsonl parser_health.json; do git add "$p" 2>/dev/null || true; done
          git diff --staged --quiet || git commit -m "update pinned_summary.json"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            sleep 5
          done
