name: DealHawk Summary

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj zależności
        run: pip install cloudscraper requests

      - name: Wyślij podsumowanie dnia
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python summary.py

      - name: Zapisz pinned_summary.json
        run: |
          git config user.name "DealHawk Bot"
          git config user.email "bot@dealhawk"
          git add pinned_summary.json
          git diff --staged --quiet || git commit -m "update pinned_summary.json"
          git push
