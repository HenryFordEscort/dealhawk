name: Testy

on:
  push:
    paths:
      - "tracker.py"
      - "summary.py"
      - "test.py"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj zależności
        run: pip install cloudscraper requests

      - name: Uruchom testy regresyjne
        run: python test.py
